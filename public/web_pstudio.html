<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web PStudio | Ultimate Engine</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <script src="https://cdn.jsdelivr.net/npm/midi-writer-js@2.1.4/browser/index.js"></script>

    <style>
        :root {
            --bg: #0b0c0f;
            --panel: #16181d;
            --accent: #ffa500;
            --border: #2a2d34;
            --text: #c0c0c0;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* NAVBAR - Верхняя панель */
        .navbar {
            height: 70px;
            background: #000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        /* Контейнер ВЕРХНЕЙ рекламы (оставляем всегда) */
        .ad-top-container {
            flex-grow: 1;
            display: flex; justify-content: center;
            max-height: 60px; overflow: hidden;
            margin: 0 20px;
        }

        .nav-btns { display: flex; gap: 10px; }

        .nav-btn {
            background: var(--panel); border: 1px solid var(--border);
            color: var(--text); padding: 8px 15px; cursor: pointer;
            border-radius: 4px; font-weight: bold; text-transform: uppercase;
            font-size: 11px;
        }

        .page-container { flex-grow: 1; display: flex; position: relative; }
        .page { display: none; width: 100%; height: 100%; }
        .page.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }

        /* БОКОВОЙ БАННЕР (который мешает) */
        .ad-sidebar {
            position: absolute; right: 10px; top: 10px;
            width: 300px; height: 250px;
            z-index: 100; background: rgba(0,0,0,0.5);
            border-radius: 8px; overflow: hidden;
        }

        /* КЛАСС ДЛЯ СКРЫТИЯ */
        .hidden-ad {
            display: none !important;
        }

        /* Превью панель */
        .preview-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 55vh;
            background: var(--panel); border-top: 3px solid var(--accent);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            z-index: 2000; display: flex; padding: 20px; box-sizing: border-box; gap: 20px;
        }
        .preview-panel.open { bottom: 0; }
        .preview-img { width: 300px; height: 100%; background: #000 center/cover; border-radius: 8px; }
        .launch-btn { background: var(--accent); color: #000; border: none; padding: 15px 30px; font-weight: 900; cursor: pointer; border-radius: 4px; margin-top: 15px; }

        .overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); display: none; z-index: 1500; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo-text" style="color: var(--accent); font-weight: 900;">WEB PSTUDIO</div>
        
        <div class="ad-top-container">
            <script type="text/javascript">
                atOptions = { 'key' : '461fc1b30ddf891492b673d9f9ce6b0b', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };
            </script>
            <script type="text/javascript" src="//www.highperformanceformat.com/461fc1b30ddf891492b673d9f9ce6b0b/invoke.js"></script>
        </div>

        <div class="nav-btns">
            <button id="btn-back" class="nav-btn hidden-ad" onclick="goBack()">В меню</button>
            <button class="nav-btn" onclick="openPreview('audio')">Audio</button>
            <button class="nav-btn" onclick="openPreview('d')">3D</button>
        </div>
    </div>

    <div class="page-container">
        <div id="page-audio" class="page">
            <div id="banner-to-hide" class="ad-sidebar">
                <script type="text/javascript">
                    atOptions = { 'key' : 'e12a683813d15c90e3c07907f05208ae', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
                </script>
                <script type="text/javascript" src="//www.highperformanceformat.com/e12a683813d15c90e3c07907f05208ae/invoke.js"></script>
            </div>
            <iframe id="daw-frame" src="about:blank"></iframe>
        </div>

        <div id="page-d" class="page">
            <iframe id="three-frame" src="about:blank"></iframe>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closePreview()"></div>
    <div class="preview-panel" id="previewPanel">
        <div class="preview-img" id="prevImg"></div>
        <div class="preview-info">
            <div id="mdContent"></div>
            <button class="launch-btn" id="launchBtn">Перейти к работе</button>
        </div>
    </div>

    <script>
        const docs = {
            audio: { title: "Audio Editor", text: "Tone.js Engine", img: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=500", file: "audio.html" },
            d: { title: "3D Visualizer", text: "WebGL Rendering", img: "https://images.unsplash.com/photo-1633167606207-d840b5070fc2?w=500", file: "3d.html" }
        };

        let activeTarget = '';

        function openPreview(type) {
            activeTarget = type;
            const data = docs[type];
            document.getElementById('mdContent').innerHTML = `<h2>${data.title}</h2><p>${data.text}</p>`;
            document.getElementById('prevImg').style.backgroundImage = `url(${data.img})`;
            document.getElementById('previewPanel').classList.add('open');
            document.getElementById('overlay').classList.add('active');
        }

        function closePreview() {
            document.getElementById('previewPanel').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
        }

        // АКТИВАЦИЯ ПРИЛОЖЕНИЯ
        document.getElementById('launchBtn').onclick = function() {
            const data = docs[activeTarget];
            closePreview();
            
            // 1. Скрываем боковой баннер, который мешает
            document.getElementById('banner-to-hide').classList.add('hidden-ad');
            
            // 2. Показываем кнопку "Назад"
            document.getElementById('btn-back').classList.remove('hidden-ad');

            // 3. Переключаем страницы
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + activeTarget).classList.add('active');

            const frameId = activeTarget === 'audio' ? 'daw-frame' : 'three-frame';
            const frame = document.getElementById(frameId);
            if (frame.src.includes('about:blank')) frame.src = data.file;
        };

        // ВОЗВРАТ В МЕНЮ
        function goBack() {
            // Возвращаем баннер обратно
            document.getElementById('banner-to-hide').classList.remove('hidden-ad');
            document.getElementById('btn-back').classList.add('hidden-ad');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        }
    </script>
</body>
</html>
